<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ assessment_title }} - AI潜能测评系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>{{ assessment_title }}</h1>
            <p class="subtitle">请根据您的真实情况选择最符合的选项</p>
        </header>

        <main class="main-content">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">{{ total_questions }}</span>
                </div>
            </div>

            <div class="question-container" id="questionContainer">
                <div class="question-card">
                    <h2 class="question-text" id="questionText">加载中...</h2>
                    <div class="options-container" id="optionsContainer">
                    </div>
                </div>
            </div>

            <div class="navigation-buttons">
                <button id="prevBtn" onclick="previousQuestion()" class="btn-secondary" disabled>
                    上一题
                </button>
                <button id="nextBtn" onclick="nextQuestion()" class="btn-primary">
                    下一题
                </button>
                <button id="submitBtn" onclick="submitAssessment()" class="btn-success" style="display: none;">
                    提交测评
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 AI潜能测评与生涯导航系统 | 大创项目</p>
        </footer>
    </div>

    <script>
        let currentQuestionIndex = 0;
        let answers = {};
        let questions = {{ questions | safe }};

        function loadQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option-item';
                if (answers[currentQuestionIndex] === index) {
                    optionDiv.classList.add('selected');
                }
                
                optionDiv.onclick = function() {
                    selectOption(index);
                };
                
                optionDiv.innerHTML = `
                    <span>${option}</span>
                `;
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(optionIndex) {
            answers[currentQuestionIndex] = optionIndex;
            
            document.querySelectorAll('.option-item').forEach((item, index) => {
                if (index === optionIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'inline-block';
            } else {
                document.getElementById('nextBtn').style.display = 'inline-block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function submitAssessment() {
            const assessmentType = '{{ assessment_type }}';
            
            fetch('/api/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    type: assessmentType,
                    answers: answers
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `/result/${assessmentType}`;
                } else {
                    alert('提交失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('提交失败，请重试');
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadQuestion();
        });
    </script>
</body>
</html>
