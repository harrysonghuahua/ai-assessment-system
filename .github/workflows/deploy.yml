name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask python-dotenv requests reportlab
        
    - name: Create static version
      run: |
        # 创建静态版本（简化版，用于GitHub Pages）
        mkdir -p docs
        cp -r templates/* docs/
        cp -r static/* docs/
        
        # 创建简单的index.html
        cat > docs/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AI潜能测评系统 - GitHub Pages版本</title>
            <link rel="stylesheet" href="css/style.css">
        </head>
        <body>
            <div class="container">
                <header class="header">
                    <h1>AI潜能测评与生涯导航系统</h1>
                    <p class="subtitle">大创项目 - GitHub Pages版本</p>
                </header>
                
                <main class="main-content">
                    <div class="info-card">
                        <h3>📋 项目说明</h3>
                        <p>这是一个AI赋能的潜能多维度测评和动态生涯路径发展导航工具。</p>
                        <p>由于GitHub Pages是静态网站托管服务，完整功能需要部署到支持Python的服务器。</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>🚀 完整功能版本</h3>
                        <p>要体验完整的AI测评功能，请访问：</p>
                        <p><strong>本地运行：</strong> <code>python3 app.py</code></p>
                        <p><strong>云服务器部署：</strong> 阿里云/腾讯云学生优惠</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>📚 项目特色</h3>
                        <ul>
                            <li>四个维度专业测评（性格、能力、兴趣、学习风格）</li>
                            <li>AI驱动的个性化分析报告</li>
                            <li>能力雷达图可视化</li>
                            <li>职业发展路径规划</li>
                            <li>PDF报告导出功能</li>
                        </ul>
                    </div>
                </main>
                
                <footer class="footer">
                    <p>&copy; 2026 AI潜能测评与生涯导航系统 | 大创项目</p>
                </footer>
            </div>
        </body>
        </html>
        EOF
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs